# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
  #  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=8.0',
  # Default workspace at startup. Workspace 1 lives on the LG when docked, and
  # falls back to the built-in when undocked.
  'workspace 1',
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = 'move-mouse window-lazy-center'

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 12
inner.vertical = 12
outer.left = 6
outer.bottom = 6
outer.top = 6
outer.right = 6

# Pin each monitor's workspaces. AeroSpace names are global (no per-monitor
# numbering like niri), so we slice the namespace numpad-style: LG = 1-3,
# built-in = 7-9 (4-6 left free for future direct-jump binds). Undocked, the
# LG's workspaces fall back to the main (built-in) monitor — nothing is lost.
[workspace-to-monitor-force-assignment]
1 = 'LG'
2 = 'LG'
3 = 'LG'
7 = 'Built-in'
8 = 'Built-in'
9 = 'Built-in'

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
#                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                   backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter shortcut
# (like in i3)
# alt-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

cmd-t = [
  "exec-and-forget /etc/profiles/per-user/jimmyff/bin/kitty /Users/jimmyff/",
]

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
cmd-shift-slash = 'layout tiles horizontal vertical'
cmd-shift-comma = 'layout accordion horizontal vertical'

# Window nav (Cmd) — niri-style "flow": at the workspace edge, focus spills into
# the outer axis. h/l → monitors (left/right), j/k → the workspace strip. h/l are
# native; j/k take a bash hop since AeroSpace has no "focus-or-workspace" action.
# All wrap. See: .../commands#focus  .../commands#move
cmd-h = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors left'
cmd-l = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors right'
cmd-j = 'exec-and-forget /etc/profiles/per-user/jimmyff/bin/aerospace focus --boundaries workspace --boundaries-action fail down || /etc/profiles/per-user/jimmyff/bin/aerospace workspace --wrap-around next --no-stdin'
cmd-k = 'exec-and-forget /etc/profiles/per-user/jimmyff/bin/aerospace focus --boundaries workspace --boundaries-action fail up || /etc/profiles/per-user/jimmyff/bin/aerospace workspace --wrap-around prev --no-stdin'

# Move the focused window with the same flow (Cmd+Shift). Crossing into a new
# workspace carries focus along (--focus-follows-window), niri-style. Note: move
# h/l cross monitors but can't wrap — native `move` has no wrap action.
cmd-shift-h = 'move --boundaries all-monitors-outer-frame --boundaries-action stop left'
cmd-shift-l = 'move --boundaries all-monitors-outer-frame --boundaries-action stop right'
cmd-shift-j = 'exec-and-forget /etc/profiles/per-user/jimmyff/bin/aerospace move --boundaries workspace --boundaries-action fail down || /etc/profiles/per-user/jimmyff/bin/aerospace move-node-to-workspace --wrap-around next --no-stdin --focus-follows-window'
cmd-shift-k = 'exec-and-forget /etc/profiles/per-user/jimmyff/bin/aerospace move --boundaries workspace --boundaries-action fail up || /etc/profiles/per-user/jimmyff/bin/aerospace move-node-to-workspace --wrap-around prev --no-stdin --focus-follows-window'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
cmd-minus = 'resize smart -50'
cmd-equal = 'resize smart +50'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
# Workspace axis = Alt+j/k (mirrors niri). Each monitor owns a fixed strip via
# [workspace-to-monitor-force-assignment] above; j/k cycles the focused strip.
# Window axis = Cmd+hjkl above. The ⌘⌥ layer is left free for zellij (the
# multiplexer). See docs/multiplexing.md.
alt-j = 'workspace --wrap-around next'
alt-k = 'workspace --wrap-around prev'

# Monitor axis = Alt+h/l (monitors sit left/right). Mirrors the workspace axis;
# wraps so neither key is dead on a 2-monitor setup. Mouse follows focus via
# on-focused-monitor-changed. See: .../commands#focus-monitor
alt-h = 'focus-monitor --wrap-around left'
alt-l = 'focus-monitor --wrap-around right'

# Take the focused window to the prev/next workspace, arriving with it
# (--focus-follows-window). "Add Shift to the nav key to carry the window."
# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
alt-shift-j = 'move-node-to-workspace --wrap-around next --focus-follows-window'
alt-shift-k = 'move-node-to-workspace --wrap-around prev --focus-follows-window'
# Same for monitors: take the window to the monitor left/right, focus follows.
alt-shift-h = 'move-node-to-monitor --wrap-around left --focus-follows-window'
alt-shift-l = 'move-node-to-monitor --wrap-around right --focus-follows-window'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
alt-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
# Move the whole workspace (not just the focused window) to the next monitor.
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-shift-enter = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = [
  'layout floating tiling',
  'mode main',
] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

# sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
#s = ['layout sticky tiling', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

down = 'volume down'
up = 'volume up'
shift-down = ['volume set 0', 'mode main']
