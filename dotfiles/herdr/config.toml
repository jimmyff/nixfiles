# herdr — agent-aware terminal multiplexer. Default backend for `mux`.
# Symlinked to ~/.config/herdr/config.toml. The persistent server does NOT auto-reload —
# after editing run: herdr server reload-config  (or `herdr server stop` then relaunch). See herdr.nix.
# Schema: https://herdr.dev/docs/configuration/ (verified against src/config on master).
# View upstream defaults any time with: herdr --default-config

onboarding = false

[terminal]
default_shell = "nu"
shell_mode    = "auto"     # login | non_login | auto
new_cwd       = "follow"   # new panes inherit the active pane's cwd

[theme]
name = "catppuccin"        # Catppuccin Mocha base

[theme.custom]
accent = "#ffe27a"         # gold active-pane border + highlights

[update]
version_check  = false     # nix owns the version — don't phone home
manifest_check = false

# herdr natively creates/opens git worktrees at <directory>/<repo>/<branch-slug> — that IS the
# ~/projects layout (herdr's own default is ~/.herdr/worktrees, so ~ expansion is supported).
[worktrees]
directory = "~/projects"

[ui]
confirm_close = true                       # confirm before closing a workspace
show_agent_labels_on_pane_borders = true   # agent labels in split pane borders

agent_panel_sort = "spaces"
[ui.sound]
enabled = false   # no agent state-change notification sounds

# --- Keybinds -----------------------------------------------------------------
# Mirrors your system-wide nav scheme (super = cmd). Each binding is [prefix-fallback, your-chord];
# prefix is ctrl+b. herdr grabs ONLY bound keys — everything else flows to the inner TUI (Claude, helix).
#   panes      super+alt+hjkl focus · super+alt+shift+hjkl resize · n right / m down split · f zoom · r rename · d detach
#   tabs       super+ctrl+h/l prev/next · n new · w close · r rename
#   worktrees  super+ctrl+j/k down/up · super+ctrl+shift+{n new · w close · r rename} · prefix+w picker
#   agents     super+ctrl+shift+j/k = focus next/prev agent in the sidebar
#   sessions   super+alt+space = session navigator (goto)
#   (super+hjkl = WM windows → left to aerospace/niri)
# After editing this file, apply it with:  herdr server reload-config
[keys]
prefix = "ctrl+b"

# panes — super+alt
focus_pane_left  = ["prefix+h", "cmd+alt+h"]
focus_pane_down  = ["prefix+j", "cmd+alt+j"]
focus_pane_up    = ["prefix+k", "cmd+alt+k"]
focus_pane_right = ["prefix+l", "cmd+alt+l"]
split_vertical   = ["prefix+v", "cmd+alt+n"]       # n → new pane right (side by side)
split_horizontal = ["prefix+minus", "cmd+alt+m"]   # m → new pane down (stacked)
zoom             = ["prefix+z", "cmd+alt+f"]
rename_pane      = ["prefix+shift+p", "cmd+alt+r"]
detach           = ["prefix+q", "cmd+alt+d"]
resize_mode      = ["prefix+r"]                    # modal resize fallback (then h/j/k/l, esc exits)

# tabs — super+ctrl
previous_tab = ["prefix+p", "cmd+ctrl+h"]
next_tab     = ["prefix+n", "cmd+ctrl+l"]
new_tab      = ["prefix+c", "cmd+ctrl+n"]
close_tab    = ["prefix+shift+x", "cmd+ctrl+w"]
rename_tab   = ["prefix+shift+t", "cmd+ctrl+r"]

# worktrees (herdr workspaces) — super+ctrl+j/k nav, super+ctrl+shift ops, super+alt+space picker
next_workspace     = ["cmd+ctrl+j"]                        # down
previous_workspace = ["cmd+ctrl+k"]                        # up
new_workspace      = ["prefix+shift+n", "cmd+ctrl+shift+n"]
close_workspace    = ["prefix+shift+d", "cmd+ctrl+shift+w"]
rename_workspace   = ["prefix+shift+w", "cmd+ctrl+shift+r"]
workspace_picker   = ["prefix+w"]

# agents — cycle focus through the agent sidebar (super+ctrl+shift+j/k)
next_agent     = ["cmd+ctrl+shift+j"]   # down
previous_agent = ["cmd+ctrl+shift+k"]   # up

# sessions — super+alt+space opens the session navigator (jump between herdr sessions)
goto = ["prefix+g", "cmd+alt+space"]

# resize — herdr has no native per-direction resize keybind (only resize_mode), so these are
# custom commands shelling out to `herdr pane resize`. super+alt+shift+h/j/k/l = left/down/up/right.
[[keys.command]]
key = "cmd+alt+shift+h"
type = "shell"
command = "herdr pane resize --direction left --current"
description = "resize pane left"

[[keys.command]]
key = "cmd+alt+shift+j"
type = "shell"
command = "herdr pane resize --direction down --current"
description = "resize pane down"

[[keys.command]]
key = "cmd+alt+shift+k"
type = "shell"
command = "herdr pane resize --direction up --current"
description = "resize pane up"

[[keys.command]]
key = "cmd+alt+shift+l"
type = "shell"
command = "herdr pane resize --direction right --current"
description = "resize pane right"
