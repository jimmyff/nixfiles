# flake-freshness package monitoring configuration
#
# Group packages by their nixpkgs input sources.
# These inputs should match the specialized inputs defined in your flake.nix
#
# Copy this file to ~/.config/flake-freshness/freshness.toml and customize
# to track the packages you care about.

[packages]

# Stable packages
# The base system + home-manager `programs.*` use the stable pkgs set
# (home-manager.useGlobalPkgs = true), so most daily tools live here.
pkgs-stable = [
  "rclone",
  # CLI / TUI tools
  "kitty", "starship", "atuin", "yazi", "lazygit", "gh",
  # "delta",
  # Cloud
  "firebase-tools",
]

# Unstable packages (desktop, apps, dev tools, Flutter, Rust, Android)
pkgs-unstable = [
  # Dev tools (editors, LSPs, formatters, shell)
  "helix", "zed-editor", "nushell", "go",
  # "direnv",
  # Flutter / Android
  "flutter", "dart", "android-studio",
  # "zulu17",
  # Cloud
  "google-cloud-sdk",
  # Rust
  # "rustc", "cargo", "rust-analyzer",
  # Desktop
  "aerospace", "niri",
  # COSMIC
  # "cosmic-session", "cosmic-comp", "cosmic-greeter", "cosmic-panel",
  # "cosmic-settings", "cosmic-files", "cosmic-edit", "cosmic-launcher",
  # User applications
  # "thunderbird",
  "ungoogled-chromium",
]

# AI Tools (bleeding edge)
pkgs-ai = ["claude-code", "antigravity-cli"]
